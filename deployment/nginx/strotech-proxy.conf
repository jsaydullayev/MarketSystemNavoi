# Shared proxy headers — drop at /etc/nginx/snippets/strotech-proxy.conf
# Included from every location{} block in strotech.uz.conf so we set the
# X-Forwarded-* trio in exactly one place.
#
#   nginx adds the original client IP onto X-Forwarded-For; the .NET layer's
#   UseForwardedHeaders middleware reads it back so RemoteIpAddress sees the
#   real client. X-Forwarded-Proto is what makes Request.IsHttps true inside
#   ASP.NET even though Kestrel itself is on plain HTTP.
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;

# Kestrel will quietly return 502 if we hold the connection idle too long.
proxy_read_timeout    60s;
proxy_send_timeout    60s;
proxy_connect_timeout 10s;
