# =============================================================================
#  TEMPORARY HTTP-only access via raw server IP (158.220.123.53)
# =============================================================================
#  Use this ONLY until strotech.uz SSL is configured through Cloudflare.
#  It serves the Flutter SPA and proxies the API over plain HTTP on port 80
#  for any Host that doesn't match strotech.uz (i.e. the raw IP).
#
#  Why this exists:
#    Hitting the raw IP over the strotech.uz vhost forces an HTTP->HTTPS
#    redirect, then presents the strotech.uz TLS cert for an IP URL — the
#    browser rejects the cert mismatch and the app shows "Tarmoq xatosi".
#    Serving plain HTTP on the IP avoids TLS entirely. SPA and API share the
#    same origin (http://158.220.123.53), so no CORS preflight is involved.
#
#  Install:
#    sudo cp deployment/nginx/ip-access.conf /etc/nginx/sites-available/ip-access.conf
#    sudo ln -sf /etc/nginx/sites-available/ip-access.conf /etc/nginx/sites-enabled/ip-access.conf
#    # Remove the stock default site if it also claims default_server on :80
#    sudo rm -f /etc/nginx/sites-enabled/default
#    sudo nginx -t && sudo systemctl reload nginx
#
#  Remove once strotech.uz HTTPS works:
#    sudo rm /etc/nginx/sites-enabled/ip-access.conf
#    sudo nginx -t && sudo systemctl reload nginx
# =============================================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    server_tokens off;
    client_max_body_size 10M;

    access_log /var/log/nginx/ip-access.access.log;
    error_log  /var/log/nginx/ip-access.error.log warn;

    # API — proxy straight to the .NET container. Plain HTTP, no redirect.
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # SignalR — WebSocket, 24h keep-alive.
    location /hubs/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 10s;
    }

    # Health passthrough (no access log noise).
    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # Flutter SPA — everything else goes to the nginx:alpine container.
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_connect_timeout  5s;
    }
}
