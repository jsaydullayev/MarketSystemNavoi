# =============================================================================
#  Production nginx config for strotech.uz
# =============================================================================
#
#  Topology
#    Public traffic  ->  nginx (this config, host network, ports 80/443)
#                    \-> Flutter SPA   (Docker, 127.0.0.1:8081)
#                    \-> .NET API      (Docker, 127.0.0.1:8080)
#                    \-> SignalR hubs  (Docker, 127.0.0.1:8080)
#
#  TLS: certificates managed by certbot (Let's Encrypt).
#       Renewal runs as a cron via the certbot package's systemd timer.
#
#  Drop this file at:   /etc/nginx/sites-available/strotech.uz.conf
#  Symlink:             /etc/nginx/sites-enabled/strotech.uz.conf
#  Reload after edit:   nginx -t && systemctl reload nginx
#
#  Initial certificate issuance:
#     sudo certbot --nginx -d strotech.uz -d www.strotech.uz
# =============================================================================

# ---------------------------------------------------------------------------
# Rate limiting zones (declared once at the http{} scope via include).
# These slot in as an extra defence layer ahead of the .NET RateLimiter.
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=auth_login:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=120r/m;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# ---------------------------------------------------------------------------
# 1) HTTP server — redirects everything to HTTPS, plus the Let's Encrypt
#    ACME challenge path which must stay on port 80.
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name strotech.uz www.strotech.uz;

    # ACME http-01 challenge for cert renewal stays on port 80.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Everything else: force HTTPS. 301 is cached forever by browsers so it
    # only takes one redirect per client per resource over the long run.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# 2) HTTPS server — actual app surface.
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name strotech.uz www.strotech.uz;

    # certbot manages these files. If you renew with a different CA the
    # paths stay the same — only the cert contents change.
    ssl_certificate     /etc/letsencrypt/live/strotech.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/strotech.uz/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/strotech.uz/chain.pem;

    # Modern TLS — inside server block to avoid conflicts with http-level config.
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers  on;
    ssl_ciphers                'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_session_timeout        1d;
    ssl_session_cache          shared:SSL:50m;
    ssl_session_tickets        off;
    ssl_stapling               on;
    ssl_stapling_verify        on;
    resolver                   1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout           5s;

    # -----------------------------------------------------------------------
    # Security headers
    # -----------------------------------------------------------------------
    # HSTS — 180 days, includeSubDomains. Opt into "preload" only after every
    # subdomain serves HTTPS and you've manually submitted the domain.
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
    # Minimal CSP — relaxed only for the Flutter SPA's inline bootstrap and
    # web-assembly. Tighten if you ship a strict frontend later.
    add_header Content-Security-Policy    "default-src 'self'; img-src 'self' data: blob:; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss:; frame-ancestors 'self';" always;
    proxy_hide_header X-Powered-By;
    server_tokens off;

    # Client body size — covers profile-image uploads (≤5MB) plus some slack.
    client_max_body_size 10M;

    # -----------------------------------------------------------------------
    # Compression
    # -----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/json application/javascript;

    # Connection cap so a single client can't open hundreds of in-flight
    # requests at once.
    limit_conn conn_per_ip 50;

    # -----------------------------------------------------------------------
    # Logs
    # -----------------------------------------------------------------------
    access_log /var/log/nginx/strotech.uz.access.log;
    error_log  /var/log/nginx/strotech.uz.error.log warn;

    # -----------------------------------------------------------------------
    # Auth endpoints — extra-strict rate-limit zone in addition to the
    # in-process limiter. burst=10 nodelay smooths legitimate retries while
    # still capping a brute-force scanner.
    # -----------------------------------------------------------------------
    location ~ ^/api/Auth/(Login|Register|RefreshToken)$ {
        limit_req zone=auth_login burst=10 nodelay;
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/snippets/strotech-proxy.conf;
    }

    # -----------------------------------------------------------------------
    # API proxy
    # -----------------------------------------------------------------------
    location /api/ {
        limit_req zone=api_general burst=40 nodelay;
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/snippets/strotech-proxy.conf;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # -----------------------------------------------------------------------
    # SignalR (WebSocket upgrade)
    # The proxy snippet already sets proxy_http_version 1.1; we just need to
    # add the Upgrade/Connection headers and extend the timeouts. Directives
    # below the include override the snippet's values where they overlap.
    # -----------------------------------------------------------------------
    location /hubs/ {
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/snippets/strotech-proxy.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # -----------------------------------------------------------------------
    # Health passthrough (no rate limit; monitor uses it).
    # -----------------------------------------------------------------------
    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
        include /etc/nginx/snippets/strotech-proxy.conf;
        access_log off;
    }

    # -----------------------------------------------------------------------
    # Flutter SPA — catch-all.
    # -----------------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8081;
        include /etc/nginx/snippets/strotech-proxy.conf;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }
}
