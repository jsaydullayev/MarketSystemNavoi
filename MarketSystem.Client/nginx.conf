# Nginx configuration for Flutter Web Single Page Application (SPA)
server {
    listen 80;
    server_name localhost;

    # API proxy - forward /api requests to backend
    location /api/ {
        proxy_pass http://114.29.239.156:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;

        # SPA routing: if file isn't found, fallback to index.html
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html to ensure users always get the latest app version
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
