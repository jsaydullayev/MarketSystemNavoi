name: market_system_client
description: Market System Mobile App
publish_to: "none"
version: 1.0.0+10

environment:
    sdk: ">=3.8.0 <4.0.0"

dependencies:
    flutter:
        sdk: flutter
    flutter_localizations:
        sdk: flutter
    # Used by main.dart for usePathUrlStrategy() (clean web URLs without #).
    flutter_web_plugins:
        sdk: flutter

    # UI
    cupertino_icons: ^1.0.6

    # State Management
    provider: ^6.1.1
    flutter_bloc: ^8.1.3
    equatable: ^2.0.5

    # HTTP & Network — http is the only client used by data/services.
    # The legacy dio + interceptor stack was removed once the auth flow
    # consolidated on HttpService.
    http: ^1.1.0

    # Dependency Injection
    get_it: ^7.6.4

    # Internet connectivity
    connectivity_plus: ^5.0.2

    # Local Storage
    shared_preferences: ^2.5.4
    flutter_secure_storage: ^9.2.2
    path_provider: ^2.1.5

    # JSON Serialization
    json_annotation: ^4.11.0

    # Utils
    intl: ^0.20.2
    uuid: ^4.2.1
    pdf: ^3.10.7
    printing: ^5.11.1

    # Image Picker
    image_picker: ^1.0.7
    image_picker_for_web: ^3.0.6
    image_picker_android: ^0.8.13
    image_picker_ios: ^0.8.13
    flutter_native_splash: ^2.4.4
    adaptive_theme: ^3.6.0
    universal_html: ^2.3.0
    flutter_advanced_drawer: ^1.5.0
    zoom_tap_animation: ^1.1.0
    open_filex: ^4.7.0
    share_plus: ^12.0.1
    liquid_pull_to_refresh: ^3.0.1
    cached_network_image: ^3.4.1
    # Masonry (variable-height) grid: POS product tiles stay compact for short
    # names yet grow to show long names fully (new-sale + continue-sale grids).
    flutter_staggered_grid_view: ^0.7.0
    # google_fonts removed — Inter is now bundled (assets/fonts/Inter-Variable.ttf)
    # and used via plain TextStyle in app_typography.dart, so the app no longer
    # fetches fonts from fonts.gstatic.com at runtime.

    # Excel Import
    file_picker: ^8.1.7 # Cross-platform fayl tanlash (.xlsx)
    excel: ^3.0.0 # .xlsx parsing va generatsiya (v4 archive konflikti bor)

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^3.0.0
    build_runner: ^2.4.7
    json_serializable: ^6.7.1
    flutter_launcher_icons: ^0.14.3
    # FAZA 2 — bloc tests. `bloc_test` gives us `blocTest()` for transition
    # assertions; `mocktail` is the null-safety-friendly mock library that
    # doesn't need codegen (unlike Mockito). Both are dev-only.
    bloc_test: ^9.1.5
    mocktail: ^1.0.4

# Ishga tushish (splash) ekrani. Ilgari konfiguratsiya umuman yo'q edi:
# Android'da splash oddiy OQ fon edi, iOS'da esa LaunchScreen.storyboard
# mavjud bo'lmagan "LaunchBackground" rasmiga murojaat qilardi → iPhone'da
# ilova bo'm-bo'sh oq ekran bilan ochilardi.
#
# Ranglar ilovaning sahifa foniga (AppColors.bg / AppColors.darkBg) AYNAN mos —
# shunda splash'dan ilovaga o'tishda rang sakramaydi.
# Light: to'liq logotip (qora matn — och fonda o'qiladi).
# Dark:  logo plitkasi (o'zi to'q sariq — to'q fonda ham ko'rinadi).
flutter_native_splash:
    # WEB uchun splash generatsiya QILINMAYDI. Bu paket web/index.html'ni ham
    # qayta yozib, brauzerda yuklanish paytida splash ko'rsatardi — web'da bunga
    # ehtiyoj yo'q edi va u faqat halaqit berardi.
    web: false

    # DIQQAT — rasm tanlash:
    #   logo.png    — alpha kanali YO'Q (colorType=2), dumaloq burchaklari QATTIQ
    #                 OQ piksel sifatida saqlangan. To'q fonda u oq kvadrat bo'lib
    #                 ko'rinadi. Shuning uchun bu yerda ISHLATILMAYDI.
    #   app_icon.png — to'la to'q sariq (#F6862A) kvadrat, oq chekka yo'q → to'q
    #                 fonda toza ko'rinadi.
    #   splash.png  — to'liq logotip (qora matn), faqat OCH fonda o'qiladi.
    color: "#F8FAFC"
    image: "assets/images/splash.png"
    color_dark: "#0B1426"
    image_dark: "assets/images/app_icon.png"
    android_12:
        image: "assets/images/app_icon.png"
        color: "#F8FAFC"
        image_dark: "assets/images/app_icon.png"
        color_dark: "#0B1426"

flutter_launcher_icons:
    android: true
    ios: true
    image_path: "assets/images/logo.png"
    # iOS ikonkasi app_icon.png dan — logo.png ning dumaloq burchaklari QATTIQ OQ
    # piksel (alpha yo'q), iOS esa ikonkani o'z squircle maskasi bilan kesadi va
    # burchaklarda oq chekka ko'rinib qolardi. app_icon.png to'la to'q sariq.
    image_path_ios: "assets/images/app_icon.png"
    # iOS ikonkasida alpha (shaffoflik) BO'LMASLIGI shart — aks holda App Store
    # yuklashni "ERROR ITMS-90717: Invalid App Store Icon" bilan rad etadi.
    # Shaffof pikselllar brend to'q sariq foniga quyiladi.
    remove_alpha_ios: true
    background_color_ios: "#F6862A"
    # Desktop + web use app_icon.png — a full-bleed orange square (the brand
    # logo with its transparent/white corners flooded to #F6862A) so the icon
    # has no white edges in the taskbar, browser tab, or installed-PWA shell.
    windows:
        generate: true
        image_path: "assets/images/app_icon.png"
        icon_size: 256
    web:
        generate: true
        image_path: "assets/images/app_icon.png"
        background_color: "#F6862A"
        theme_color: "#F6862A"

flutter:
    uses-material-design: true
    generate: true

    assets:
        - assets/images/
        - assets/lottie/
        - assets/svg/
        - assets/translations/

    # Inter bundled locally (variable font, all weights) so the app never
    # fetches it from fonts.gstatic.com at runtime — see app_typography.dart.
    fonts:
        - family: Inter
          fonts:
              - asset: assets/fonts/Inter-Variable.ttf
