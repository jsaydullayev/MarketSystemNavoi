name: market_system_client
description: Market System Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # State Management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # HTTP & Network
  http: ^1.1.0
  dio: ^5.4.0

  # Dependency Injection
  get_it: ^7.6.4

  # Internet connectivity
  connectivity_plus: ^5.0.2

  # Local Storage
  shared_preferences: ^2.5.4
  path_provider: ^2.1.5

  # JSON Serialization
  json_annotation: ^4.8.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.2.1
  pdf: ^3.10.7
  printing: ^5.11.1

  # Image Picker
  image_picker: ^1.0.7
  image_picker_for_web: ^3.0.6
  image_picker_android: ^0.8.13
  image_picker_ios: ^0.8.13
  flutter_native_splash: ^2.4.7
  adaptive_theme: ^3.6.0
  universal_html: ^2.3.0
  flutter_advanced_drawer: ^1.5.0
  zoom_tap_animation: ^1.1.0
  open_filex: ^4.7.0
  share_plus: ^12.0.1
  liquid_pull_to_refresh: ^3.0.1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/svg/
    - assets/translations/

  fonts:
    # Roboto Font Family - Pre-bundled to fix font loading glitches on Web
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
          style: normal
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
          style: normal
