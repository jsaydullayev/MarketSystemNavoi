name: market_system_client
description: Market System Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # State Management
  provider: ^6.1.1

  # HTTP
  http: ^1.1.0

  # Local Storage
  shared_preferences: ^2.2.2

  # JSON Serialization
  json_annotation: ^4.8.1

  # Utils
  intl: ^0.18.1
  uuid: ^4.2.1

  # Image Picker
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
