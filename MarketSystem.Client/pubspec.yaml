name: market_system_client
description: Market System Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Used by main.dart for usePathUrlStrategy() (clean web URLs without #).
  flutter_web_plugins:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # State Management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # HTTP & Network — http is the only client used by data/services.
  # The legacy dio + interceptor stack was removed once the auth flow
  # consolidated on HttpService.
  http: ^1.1.0

  # Dependency Injection
  get_it: ^7.6.4

  # Internet connectivity
  connectivity_plus: ^5.0.2

  # Local Storage
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.5

  # JSON Serialization
  json_annotation: ^4.11.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.2.1
  pdf: ^3.10.7
  printing: ^5.11.1

  # Image Picker
  image_picker: ^1.0.7
  image_picker_for_web: ^3.0.6
  image_picker_android: ^0.8.13
  image_picker_ios: ^0.8.13
  flutter_native_splash: ^2.4.4
  adaptive_theme: ^3.6.0
  universal_html: ^2.3.0
  flutter_advanced_drawer: ^1.5.0
  zoom_tap_animation: ^1.1.0
  open_filex: ^4.7.0
  share_plus: ^12.0.1
  liquid_pull_to_refresh: ^3.0.1
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1

  # Excel Import
  file_picker: ^8.1.7        # Cross-platform fayl tanlash (.xlsx)
  excel: ^3.0.0              # .xlsx parsing va generatsiya (v4 archive konflikti bor)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.3
  # FAZA 2 — bloc tests. `bloc_test` gives us `blocTest()` for transition
  # assertions; `mocktail` is the null-safety-friendly mock library that
  # doesn't need codegen (unlike Mockito). Both are dev-only.
  bloc_test: ^9.1.5
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/svg/
    - assets/translations/

