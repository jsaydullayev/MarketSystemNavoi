# ========================================
# Kamatera Deployment Configuration
# ========================================
# Usage:
# 1. Create .env file with your database credentials
# 2. Run: docker-compose -f docker-compose.kamatera.yml up -d

version: '3.8'

services:
  market-system-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-system-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - PORT=8080
      # Database connection - use external PostgreSQL on Kamatera
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      # JWT configuration
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER:-MarketSystemAPI}
      - Jwt__Audience=${JWT_AUDIENCE:-MarketSystemClient}
    networks:
      - market-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: PostgreSQL for testing (disable in production)
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: market-system-db
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     - POSTGRES_DB=${DB_NAME:-MarketSystemDB}
  #     - POSTGRES_USER=${DB_USER:-postgres}
  #     - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - market-network
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  market-network:
    driver: bridge
