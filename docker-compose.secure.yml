services:
  market-system-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-system-api
    ports:
      - "5137:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${DATABASE_URL:?DATABASE_URL is required}
      - Jwt__Key=${JWT_KEY:?JWT_KEY is required}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - market-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: market-system-db
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=${DB_NAME:?DB_NAME is required}
      - POSTGRES_USER=${DB_USER:?DB_USER is required}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - market-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${DB_USER} -d $${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  market-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
