services:

  # ── .NET 9 API ────────────────────────────────────────────────────────────────
  market-system-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-system-api
    ports:
      - "127.0.0.1:8080:8080"
    expose:
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - PORT=8080
      - ConnectionStrings__DefaultConnection=${DATABASE_URL:?DATABASE_URL is required}
      - Jwt__Key=${JWT_KEY:?JWT_KEY is required}
      - Jwt__Issuer=${JWT_ISSUER:-MarketSystemAPI}
      - Jwt__Audience=${JWT_AUDIENCE:-MarketSystemClient}
      - Cors__AllowedOrigins=${CORS_ALLOWED_ORIGINS:-}
      - SuperAdmin__ConsoleSegment=${SuperAdmin__ConsoleSegment:?SuperAdmin__ConsoleSegment is required}
      - SUPERADMIN_USERNAME=${SUPERADMIN_USERNAME:-}
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - market-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.75"
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── PostgreSQL ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: market-system-db
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=${DB_NAME:?DB_NAME is required}
      - POSTGRES_USER=${DB_USER:?DB_USER is required}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
    # Xotira iste'molini cheklash
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=128MB
      -c max_connections=50
      -c work_mem=2MB
      -c maintenance_work_mem=32MB
      -c wal_buffers=4MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - market-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER} -d $${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flutter Web (nginx:alpine) ─────────────────────────────────────────────────
  # Listens on port 80 internally; host nginx (deployment/nginx/strotech.uz.conf)
  # handles TLS termination and proxies to 127.0.0.1:8081.
  market-system-client:
    build:
      context: ./MarketSystem.Client
      dockerfile: Dockerfile
      args:
        # Baked into the Flutter bundle at build time. Must match the API's
        # SuperAdmin__ConsoleSegment or the hidden console 404s. Not a secret.
        SUPERADMIN_CONSOLE_SEGMENT: ${SuperAdmin__ConsoleSegment:-}
    container_name: market-system-client
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - market-system-api
    networks:
      - market-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"
        reservations:
          memory: 16M

volumes:
  postgres_data:
    driver: local

networks:
  market-network:
    driver: bridge
