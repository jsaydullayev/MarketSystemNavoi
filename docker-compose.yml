services:
    market-system-api:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: market-system-api
        ports:
            - "8080:8080"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        environment:
            - ASPNETCORE_ENVIRONMENT=Production
            - ASPNETCORE_URLS=http://+:8080
            - PORT=8080
            # Required — fail-fast if missing
            - ConnectionStrings__DefaultConnection=${DATABASE_URL:?DATABASE_URL is required}
            - Jwt__Key=${JWT_KEY:?JWT_KEY is required}
            - Jwt__Issuer=${JWT_ISSUER:-MarketSystemAPI}
            - Jwt__Audience=${JWT_AUDIENCE:-MarketSystemClient}
            - Cors__AllowedOrigins__0=${CORS_ALLOWED_ORIGINS:-}
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - market-network
        restart: unless-stopped
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    # PostgreSQL database — internal network only, NO host port mapping
    postgres:
        image: postgres:16-alpine
        container_name: market-system-db
        expose:
            - "5432"
        environment:
            - POSTGRES_DB=${DB_NAME:?DB_NAME is required}
            - POSTGRES_USER=${DB_USER:?DB_USER is required}
            - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - market-network
        restart: unless-stopped
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U $${DB_USER}" ]
            interval: 10s
            timeout: 5s
            retries: 5

    # Flutter Web Frontend
    market-system-client:
        build:
            context: ./MarketSystem.Client
            dockerfile: Dockerfile
        container_name: market-system-client
        ports:
            - "8081:80"
        depends_on:
            - market-system-api
        networks:
            - market-network
        restart: unless-stopped

volumes:
    postgres_data:
        driver: local

networks:
    market-network:
        driver: bridge
