services:
    market-system-api:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: market-system-api
        ports:
            - "8080:8080"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        environment:
            - ASPNETCORE_ENVIRONMENT=Production
            - ASPNETCORE_URLS=http://+:8080
            - PORT=8080
            # Database connection - using Docker's internal PostgreSQL container
            - ConnectionStrings__DefaultConnection=${DATABASE_URL:-Host=market-system-db;Port=5432;Database=MarketSystemDB;Username=postgres;Password=SuperSecur3MarketDB!2026}
            # JWT configuration
            - Jwt__Key=${JWT_KEY:-YourSuperSecretKeyThatIsAtLeast32CharactersLongForDocker!}
            - Jwt__Issuer=MarketSystemAPI
            - Jwt__Audience=MarketSystemClient
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - market-network
        restart: unless-stopped
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    # PostgreSQL database (local development uchun)
    postgres:
        image: postgres:16-alpine
        container_name: market-system-db
        ports:
            - "5433:5432" # Changed from 3030 to 5433
        environment:
            - POSTGRES_DB=MarketSystemDB
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=SuperSecur3MarketDB!2026
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - market-network
        restart: unless-stopped
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U postgres" ]
            interval: 10s
            timeout: 5s
            retries: 5

    # Flutter Web Frontend
    market-system-client:
        build:
            context: ./MarketSystem.Client
            dockerfile: Dockerfile
        container_name: market-system-client
        ports:
            - "8081:80" # Maps port 8081 of the host machine to port 80 of the Nginx container
        depends_on:
            - market-system-api
        networks:
            - market-network
        restart: unless-stopped

volumes:
    postgres_data:
        driver: local

networks:
    market-network:
        driver: bridge
