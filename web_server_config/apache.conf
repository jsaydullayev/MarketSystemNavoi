# Apache Configuration for Flutter Web - STROTECH.UZ
# Place this file in /etc/apache2/sites-available/strotech.uz.conf
# Then run: sudo a2ensite strotech.uz && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName strotech.uz
    ServerAlias www.strotech.uz
    DocumentRoot /var/www/strotech.uz

    # Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

    # Disable server signature for security
    ServerSignature Off
    ServerTokens Prod

    # Enable mod_rewrite for SPA routing
    <Directory /var/www/strotech.uz>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Rewrite rules for clean URLs
        RewriteEngine On
        RewriteBase /

        # Don't rewrite for existing files or directories
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d

        # Everything else goes to index.html
        RewriteRule ^(.*)$ index.html [L,QSA]
    </Directory>

    # Gzip compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
    </IfModule>

    # Cache static assets
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpg "access plus 1 year"
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/gif "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType image/ico "access plus 1 year"
        ExpiresByType text/css "access plus 1 year"
        ExpiresByType application/javascript "access plus 1 year"
    </IfModule>

    # Security: Block access to hidden files
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # Security: Limit request size
    LimitRequestBody 10485760

    # Access and error logs
    ErrorLog ${APACHE_LOG_DIR}/strotech.uz.error.log
    CustomLog ${APACHE_LOG_DIR}/strotech.uz.access.log combined
</VirtualHost>

