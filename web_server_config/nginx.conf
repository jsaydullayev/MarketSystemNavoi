# Nginx Configuration for STROTECH.UZ
# Acts as a reverse proxy to the Docker stack:
#   /         -> Docker Flutter container on localhost:8081 (Nginx serving Flutter Web)
#   /api/     -> Docker API container on localhost:8080
#   /hubs/    -> Docker API container on localhost:8080 (SignalR / WebSocket)
#
# Install:
#   sudo cp nginx.conf /etc/nginx/sites-available/strotech.uz
#   sudo ln -s /etc/nginx/sites-available/strotech.uz /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# After this, only `docker compose up -d --build` is needed for new releases —
# no separate `flutter build web` + `scp` to /var/www required.

server {
    listen 80;
    listen [::]:80;
    server_name strotech.uz www.strotech.uz;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    proxy_hide_header X-Powered-By;

    client_max_body_size 50M;

    # API proxy - Docker API container on host port 8080
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # SignalR hubs - WebSocket proxy to API container
    location /hubs/ {
        proxy_pass http://127.0.0.1:8080/hubs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Health check passthrough
    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_set_header Host $host;
    }

    # Everything else - Docker Flutter container on host port 8081
    # This container's internal nginx serves the SPA + handles /api/ proxy
    # for requests that come into it directly (e.g. via 8081 directly).
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Access and error logs
    access_log /var/log/nginx/strotech.uz.access.log;
    error_log /var/log/nginx/strotech.uz.error.log warn;
}

# ----------------------------------------------------------------------------
# HTTPS Configuration (after SSL certificate is obtained via certbot)
#
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d strotech.uz -d www.strotech.uz
#
# Certbot will normally update the http server above to redirect to https
# and add a parallel `server { listen 443 ssl ... }` block with the same
# location rules. Keep all `location /api/`, `/hubs/`, `/` blocks identical
# in the https block.
# ----------------------------------------------------------------------------
