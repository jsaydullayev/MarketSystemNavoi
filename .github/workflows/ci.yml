name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ─── Backend Build & Test ──────────────────────────────────────────────
  backend:
    name: Backend (.NET 9)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketsystem_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=marketsystem_test;Username=postgres;Password=postgres"
        run: dotnet test --no-build --configuration Release --verbosity normal

  # ─── Flutter Build ─────────────────────────────────────────────────────
  flutter:
    name: Flutter (Web)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: MarketSystem.Client
        run: flutter pub get

      - name: Generate l10n
        working-directory: MarketSystem.Client
        run: flutter gen-l10n

      - name: Analyze (lint)
        working-directory: MarketSystem.Client
        run: flutter analyze --no-fatal-infos

      - name: Run Flutter tests
        working-directory: MarketSystem.Client
        run: flutter test

      - name: Build web (release)
        working-directory: MarketSystem.Client
        run: flutter build web --release

  # ─── Docker Build (only on push to master) ─────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, flutter]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: marketsystem-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Client image
        uses: docker/build-push-action@v5
        with:
          context: ./MarketSystem.Client
          file: ./MarketSystem.Client/Dockerfile
          push: false
          tags: marketsystem-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
