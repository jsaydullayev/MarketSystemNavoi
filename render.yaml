services:
  # Web Service (Docker - RECOMMENDED for .NET 9.0)
  - type: web
    name: market-system-api
    env: docker
    region: singapore
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:80
      # JWT signing key — MUST be set via Render dashboard, never committed.
      # Generate per-environment with: openssl rand -base64 48
      - key: Jwt__Key
        sync: false
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: marketdb
          property: connectionString

  # PostgreSQL Database
  - type: pserv
    name: marketdb
    region: singapore
    databaseName: marketdb
    user: marketuser
    plan: free
    maxConnections: 10
