services:
  # Web Service (Docker - RECOMMENDED for .NET 9.0)
  - type: web
    name: market-system-api
    env: docker
    region: singapore
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:80
      - key: JWT__Secret
        generateValue: true
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: marketdb
          property: connectionString

  # PostgreSQL Database
  - type: pserv
    name: marketdb
    region: singapore
    databaseName: marketdb
    user: marketuser
    plan: free
    maxConnections: 10
